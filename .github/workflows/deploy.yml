name: AIPHORIA_CONVERTER_DEPLOY
on:
  push:
    branches:
      - master

# The deploy job authenticates to the prod host with SSH secrets and never
# uses GITHUB_TOKEN — deny it every scope.
permissions: {}

env:
  GO_TO_FOLDER_SCRIPT:  cd ~/aiphoria/audio-converter
  BUILD_SCRIPT: docker-compose up -d --build --force-recreate
  PRUNE_SCRIPT: docker system prune -f

jobs:
  ssh_access:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            ${{ env.GO_TO_FOLDER_SCRIPT }}
            git pull
            ${{ env.BUILD_SCRIPT }}
            ${{ env.PRUNE_SCRIPT }}
            docker ps

